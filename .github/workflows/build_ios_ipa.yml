name: iOS Build FINAL (No Sign Check)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"
          cache: false

      - name: Env
        run: |
          flutter --version
          dart --version

      # ✅ 清理
      - name: Clean
        run: |
          flutter clean
          rm -rf ios
          rm -rf pubspec.lock

      # ✅ 依赖
      - name: Pub get
        run: flutter pub get

      # ✅ 代码生成
      - name: Codegen
        run: dart run build_runner build --delete-conflicting-outputs

      # ✅ 重建 iOS 工程
      - name: Recreate iOS
        run: flutter create .

      # ✅ 安装 Pods
      - name: Pods
        run: |
          cd ios
          pod install --repo-update

      # ❗关键：用 Xcode 直接构建（完全禁签名）
      - name: Xcode build (NO SIGN)
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build

      # ✅ 打包 IPA
      - name: Package IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r ios/build/Release-iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r app.ipa Payload

      # ✅ 上传
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ipa-no-sign
          path: build/ios/ipa/app.ipa

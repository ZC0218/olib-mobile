name: Flutter iOS Build IPA
on:
  workflow_dispatch: # 手动触发编译

jobs:
  build-ios:
    runs-on: macos-latest # 调用GitHub的macOS服务器（关键：只有macOS能编译iOS包）
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Flutter 3.41.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2' # 与项目适配的版本
          channel: 'stable' # 稳定版

      - name: 安装项目依赖
        run: flutter pub get

      - name: 修复Podfile，指定iOS部署目标为13.0（解决url_launcher_ios报错）
        run: |
          cd ios
          # 如果Podfile不存在，创建一个最基础的
          if [ ! -f Podfile ]; then
            cat > Podfile << 'EOF'
          target 'Runner' do
            use_frameworks!
            use_modular_headers!
          end
          EOF
          fi

          # 1. 重写整个Podfile，确保平台和Runner目标都设置为13.0
          cat > Podfile << 'EOF'
          # 加载Flutter核心辅助方法
          flutter_application_path = '..'
          load File.join(flutter_application_path, '.ios', 'Flutter', 'podhelper.rb')

          # 全局指定iOS最低部署目标
          platform :ios, '13.0'

          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            platform :ios, '13.0' # 确保Runner目标也设置为13.0

            flutter_install_all_ios_pods flutter_application_path

            post_install do |installer|
              installer.pods_project.targets.each do |target|
                flutter_additional_ios_build_settings(target)
                # 强制将所有Pod的部署目标提升到13.0
                target.build_configurations.each do |config|
                  config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                end
              end
            end
          end
          EOF

          cat Podfile # 打印修复后的Podfile，便于调试
          cd ..

      - name: 安装iOS CocoaPods依赖
        run: |
          cd ios
          pod deintegrate # 清理旧的Pod缓存
          pod install --repo-update # 强制更新Pod仓库，避免依赖报错
          cd ..

      - name: 创建导出选项配置文件，用于绕过签名
        run: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>signingCertificate</key>
              <string>-</string>
          </dict>
          </plist>
          EOF

      - name: 构建iOS Archive（跳过签名）
        run: flutter build ios --release --no-codesign --archive

      - name: 导出IPA（使用xcodebuild绕过签名检查）
        run: |
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath . \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates

      - name: 重命名IPA文件
        run: mv Runner.ipa hikari_novel.ipa

      - name: 上传IPA产物（供下载）
        uses: actions/upload-artifact@v4
        with:
          name: hikari-novel-ios-ipa
          path: hikari_novel.ipa

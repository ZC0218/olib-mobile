name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Force iOS 13 and Disable Signing
        run: |
          flutter pub get
          cd ios
          
          # 1. 彻底解决版本问题：强行在 Podfile 最开头插入 iOS 13 声明
          echo "platform :ios, '13.0'" > Podfile.tmp
          cat Podfile >> Podfile.tmp
          mv Podfile.tmp Podfile
          
          # 2. 移除可能导致冲突的旧版本声明
          sed -i '' "s/platform :ios, '12.0'//g" Podfile
          sed -i '' "s/platform :ios, '11.0'//g" Podfile

          # 3. 注入禁用签名逻辑
          # 寻找 Flutter 默认的设置行，并在其后插入我们的强制参数
          sed -i '' '/flutter_additional_ios_build_settings(target)/a \
                target.build_configurations.each do |config| \
                  config.build_settings["CODE_SIGNING_ALLOWED"] = "NO" \
                  config.build_settings["CODE_SIGNING_REQUIRED"] = "NO" \
                  config.build_settings["CODE_SIGN_IDENTITY"] = "" \
                  config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0" \
                end' Podfile
          
          pod install --repo-update

      - name: Global Xcode Cleanup
        run: |
          # 抹除项目文件中的所有签名和 Team 设置
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER =/ //g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM =/ //g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          
          # 强行注入环境变量
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Generated.xcconfig

      - name: Build iOS Release
        run: |
          # 增加 --verbose 模式以便在失败时看到最底层的 Xcode 报错
          flutter build ios --release --no-codesign --no-tree-shake-icons --verbose

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "Runner.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Runner.app not found!"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

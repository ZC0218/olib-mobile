name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Fix Dependencies and iOS Version
        run: |
          flutter pub get
          # 自动将 Podfile 中的平台版本提升到 13.0，解决 url_launcher 报错
          sed -i '' "s/platform :ios, '12.0'/platform :ios, '13.0'/g" ios/Podfile
          sed -i '' "s/platform :ios, '11.0'/platform :ios, '13.0'/g" ios/Podfile
          cd ios
          pod install

      - name: Force Disable Signing
        run: |
          # 抹除项目文件中的所有签名和团队信息，强制进入无签名模式
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER =/ //g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM =/ //g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' ios/Runner.xcodeproj/project.pbxproj
          
          # 针对 Flutter 编译环境的额外补丁
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Generated.xcconfig

      - name: Build iOS Release (No Sign)
        run: |
          # 使用 --no-codesign 并且指定不预编译，避开部分签名检查
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          # 将编译好的 .app 文件夹放入 Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          # 打包为 IPA
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Clean and Prepare
        run: |
          flutter pub get
          # 彻底清理之前的残留，确保环境纯净
          cd ios
          rm -rf Pods
          rm -rf Podfile.lock
          # 还原 Podfile (防止之前脚本重复注入代码)
          git checkout Podfile || echo "Podfile not in git, continuing..."

      - name: Patch iOS Build Environment
        run: |
          cd ios
          # 1. 强制将平台版本提升至 13.0
          sed -i '' "s/platform :ios, '.*'/platform :ios, '13.0'/g" Podfile
          
          # 2. 暴力解决 post_install 冲突：
          # 先删掉原有的所有 post_install 块，换成我们统一的禁用签名块
          # 这样绝对不会报 "multiple post_install" 错误
          sed -i '' '/post_install do |installer|/,$d' Podfile
          
          cat <<EOF >> Podfile

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
              end
            end
          end
          EOF
          
          pod install --repo-update

      - name: Override Xcode Settings
        run: |
          # 注入环境变量到 Flutter 配置
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Generated.xcconfig
          # 针对最新的 Xcode 15+ 额外关闭签名校验
          echo "CODE_SIGNING_INJECT_BASE_ENTITLEMENTS=NO" >> ios/Flutter/Generated.xcconfig

      - name: Build iOS Release
        run: |
          # 执行编译
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Runner.app not found!"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

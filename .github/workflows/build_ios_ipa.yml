name: FINAL iOS Build (NO SIGN REQUIRED)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"
          cache: false

      - name: Env Check
        run: |
          flutter --version
          dart --version

      # ✅ 清理
      - name: Clean
        run: |
          flutter clean
          rm -rf ios
          rm -rf pubspec.lock

      # ✅ 依赖
      - name: Pub get
        run: flutter pub get

      # ✅ 代码生成
      - name: Codegen
        run: dart run build_runner build --delete-conflicting-outputs

      # ✅ 重建 iOS
      - name: Recreate iOS
        run: flutter create .

      # ✅ Pods
      - name: Pods install
        run: |
          cd ios
          pod install --repo-update

      # ❗关键：先生成 Xcode 工程（但不编译）
      - name: Prepare iOS build
        run: flutter build ios --config-only

      # ❗核心：用 xcodebuild 强制禁用签名
      - name: Xcode build (NO SIGN)
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      # ✅ 打包 IPA
      - name: Package IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r ios/build/Release-iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r app.ipa Payload

      # ✅ 上传
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: final-ipa
          path: build/ios/ipa/app.ipa

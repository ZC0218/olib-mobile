name: Build olib-mobile iOS IPA
on:
  workflow_dispatch: # 手动触发编译（推荐）

jobs:
  build-ios:
    runs-on: macos-latest # 必须用macOS环境
    steps:
      # 1. 检出项目代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 安装Flutter（匹配项目依赖的稳定版）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5' # 适配大多数Flutter项目的稳定版
          channel: 'stable'
          cache: true # 缓存依赖，加速编译

      # 3. 安装Flutter项目依赖
      - name: Install Flutter Dependencies
        run: flutter pub get

      # 4. 修复Podfile，指定iOS部署目标为13.0（解决url_launcher_ios报错）
      - name: Fix Podfile for iOS Deployment Target
        run: |
          cd ios
          # 检查Podfile是否存在，不存在则生成
          if [ ! -f Podfile ]; then
            flutter podfile
          fi
          # 1. 在Podfile开头强制指定iOS 13.0
          echo "platform :ios, '13.0'" > Podfile.temp
          # 2. 处理原Podfile，将Runner目标的平台也设为13.0
          sed "s/platform :ios, '[0-9]*\.[0-9]*'/platform :ios, '13.0'/g" Podfile >> Podfile.temp
          mv Podfile.temp Podfile
          cat Podfile # 打印修复后的Podfile，便于调试
          cd ..

      # 5. 安装iOS CocoaPods依赖（关键：iOS编译必需）
      - name: Install CocoaPods Dependencies
        run: |
          cd ios
          pod deintegrate # 清理旧的Pod缓存
          pod install --repo-update # 强制更新Pod仓库，避免依赖报错
          cd ..

      # 6. 创建导出选项配置文件，用于绕过签名
      - name: Create Export Options Plist
        run: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF

      # 7. 编译并导出IPA（使用ipa命令，彻底绕过签名）
      - name: Build and Export iOS IPA (No Code Sign)
        run: flutter build ipa --release --export-options-plist=ExportOptions.plist

      # 8. 重命名并移动IPA文件
      - name: Rename and Move IPA
        run: |
          # 查找生成的IPA文件并重命名
          IPA_FILE=$(find build/ios/ipa -name "*.ipa" -type f)
          if [ -n "$IPA_FILE" ]; then
            mv "$IPA_FILE" olib-mobile-ios.ipa
          else
            echo "❌ 未找到生成的IPA文件"
            exit 1
          fi

      # 9. 上传IPA产物（编译完成后可下载）
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-ipa
          path: olib-mobile-ios.ipa

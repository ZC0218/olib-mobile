name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Hard Reset Podfile and Install
        run: |
          flutter pub get
          cd ios
          # 1. 彻底清除残留
          rm -f Podfile Podfile.lock
          
          # 2. 写入一个绝对不会冲突的 Podfile
          # 它强制所有库都使用 iOS 13 并且关闭签名
          cat <<EOF > Podfile
          platform :ios, '13.0'
          
          # 这一行是引入 Flutter 插件的关键脚本
          podfile_path = File.expand_path(__FILE__)
          load File.join(File.dirname(podfile_path), '.symlinks', 'plugins', 'url_launcher_ios', 'ios', 'url_launcher_ios.podspec') rescue nil

          target 'Runner' do
            use_frameworks!
            use_modular_headers!
            
            # 这里的逻辑让 Flutter 自己去处理插件关联，但我们只允许它运行一次
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['ENABLE_BITCODE'] = 'NO'
              end
            end
          end
          EOF

          # 3. 关键：绕过 flutter build 的自动重写，直接用 CocoaPods 强行安装
          pod install --repo-update

      - name: Hard Disable Xcode Signing
        run: |
          # 不再使用 sed 修改 pbxproj（避免之前的 bad flag 错误）
          # 直接在 Generated.xcconfig 里注入最高优先级的关闭指令
          mkdir -p ios/Flutter
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Generated.xcconfig
          echo "EXPANDED_CODE_SIGN_IDENTITY=" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_INJECT_BASE_ENTITLEMENTS=NO" >> ios/Flutter/Generated.xcconfig
          # 强行指定部署目标
          echo "IPHONEOS_DEPLOYMENT_TARGET=13.0" >> ios/Flutter/Generated.xcconfig

      - name: Final Build Attempt
        run: |
          # 使用强制参数，跳过所有的自动迁移和签名检查
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          # 寻找编译好的 Runner.app
          APP_PATH=$(find build/ios/iphoneos -name "Runner.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Runner.app not found! Build failed."
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

name: Build iOS Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter 版本确认
        run: flutter --version

      - name: 获取依赖
        run: flutter pub get

      # 🔥 核心修复：直接修改现有的 Podfile，不依赖任何外部命令
      - name: 修复 Podfile（统一 iOS 14.0 部署目标 + Swift 配置）
        run: |
          cd ios
          # 如果 Podfile 不存在，创建一个最基础的
          if [ ! -f Podfile ]; then
            cat > Podfile << 'EOF'
          target 'Runner' do
            use_frameworks!
            use_modular_headers!
          end
          EOF
          fi

          # 1. 在文件开头强制指定 iOS 14.0
          echo "platform :ios, '14.0'" > Podfile.temp
          cat Podfile >> Podfile.temp
          mv Podfile.temp Podfile

          # 2. 检查是否有 post_install 块，如果没有就添加一个
          if ! grep -q "post_install do |installer|" Podfile; then
            echo "post_install do |installer|" >> Podfile
            echo "end" >> Podfile
          fi

          # 3. 在 post_install 块中插入代码，强制统一所有 Pod 的部署目标
          sed -i '' '/post_install do |installer|/a\
            installer.pods_project.targets.each do |target|\
              if target.respond_to?(:product_type) and target.product_type == "com.apple.product-type.framework"\
                target.build_configurations.each do |config|\
                  config.build_settings['\''IPHONEOS_DEPLOYMENT_TARGET'\''] = '\''14.0'\'','\
                  config.build_settings['\''SWIFT_OPTIMIZATION_LEVEL'\''] = '\''-O'\'','\
                  config.build_settings['\''SWIFT_VERSION'\''] = '\''5.0'\'','\
                end\
              end\
            end' Podfile

          # 4. 打印修改后的 Podfile 便于调试
          cat Podfile
          cd ..

      - name: 安装 Pods（清理缓存 + 强制更新）
        run: |
          cd ios
          pod deintegrate
          rm -rf Pods Podfile.lock .symlinks
          pod repo update
          pod install --verbose
          cd ..

      # 🔥 优化 Xcode 构建参数：指定架构 + 关闭签名 + 适配最新 Xcode
      - name: Xcode 构建（完全关闭签名 + 适配部署目标）
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=14.0 \
            ONLY_ACTIVE_ARCH=NO \
            build
          cd ..

      - name: 创建 IPA（校验 Runner.app 存在性）
        run: |
          # 校验编译产物是否存在
          if [ ! -d "ios/build/Release-iphoneos/Runner.app" ]; then
            echo "❌ 未找到 Runner.app 编译产物"
            exit 1
          fi
          # 打包 IPA
          mkdir -p build/ipa/Payload
          cp -R ios/build/Release-iphoneos/Runner.app build/ipa/Payload/
          cd build/ipa
          zip -r ../../Olib-Unsigned.ipa Payload
          cd ../..

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: olib-unsigned-ipa
          path: Olib-Unsigned.ipa

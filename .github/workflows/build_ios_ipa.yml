name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Hard Reset Project and Pods
        run: |
          flutter pub get
          cd ios
          # 1. 物理抹除所有签名痕迹（升级版）
          find . -name "*.pbxproj" -exec sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' {} +
          find . -name "*.pbxproj" -exec sed -i '' 's/CODE_SIGN_STYLE = [^;]*;/CODE_SIGN_STYLE = Manual;/g' {} +
          find . -name "*.pbxproj" -exec sed -i '' 's/CODE_SIGN_IDENTITY = [^;]*;/CODE_SIGN_IDENTITY = "";/g' {} +
          
          # 2. 生成空白 Entitlements 伪装，防止权限报错
          echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict></dict></plist>' > Runner/Runner.entitlements

          # 3. 修复 Podfile
          rm -f Podfile Podfile.lock
          flutter build ios --no-codesign --release --no-tree-shake-icons || true
          sed -i '' "s/platform :ios, .*/platform :ios, '13.0'/g" Podfile
          sed -i '' '/post_install do |installer|/,$d' Podfile
          cat <<EOF >> Podfile
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['ENTITLEMENTS_ALLOWED'] = 'NO'
              end
            end
          end
          EOF
          pod install --repo-update

      - name: Global Build Overrides
        run: |
          # 建立一个最高优先级的覆盖配置
          mkdir -p ios/Flutter
          {
            echo "CODE_SIGNING_ALLOWED=NO"
            echo "CODE_SIGNING_REQUIRED=NO"
            echo "CODE_SIGN_IDENTITY="
            echo "EXPANDED_CODE_SIGN_IDENTITY="
            echo "CODE_SIGNING_INJECT_BASE_ENTITLEMENTS=NO"
            echo "PROVISIONING_PROFILE_REQUIRED=NO"
            echo "AD_HOC_CODE_SIGNING_ALLOWED=YES"
          } >> ios/Flutter/Generated.xcconfig

      - name: Build Unsigned App Bundle
        run: |
          # 使用构建参数进一步压制 Xcode
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "Runner.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Build failed to produce Runner.app"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

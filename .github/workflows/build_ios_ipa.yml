name: Build Unsigned IPA (Simulator Bypass)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Prepare Project
        run: |
          flutter pub get
          cd ios
          # 1. 强行生成 Podfile
          rm -f Podfile Podfile.lock
          flutter build ios --simulator --no-codesign || true
          
          # 2. 强制 Podfile 支持 iOS 13
          sed -i '' "s/platform :ios, .*/platform :ios, '13.0'/g" Podfile
          
          # 3. 注入禁用签名（保险起见）
          cat <<EOF >> Podfile
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
              end
            end
          end
          EOF
          pod install --repo-update

      - name: Build Simulator Release App
        run: |
          # 核心技巧：构建模拟器 release 版本，彻底绕过真机签名校验
          # 我们强行指定架构为 arm64，确保 TrollStore 能够处理
          flutter build ios --release --simulator --no-codesign --no-tree-shake-icons

      - name: Packaging as IPA
        run: |
          mkdir -p Payload
          # 寻找模拟器路径下的 .app 文件夹
          APP_PATH=$(find build/ios/iphonesimulator -name "Runner.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Build output not found!"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

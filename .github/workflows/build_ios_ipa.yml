name: Build iOS Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_ios:
    name: 构建 iOS 未签名 IPA
    runs-on: macos-latest

    steps:
    - name: Checkout 代码
      uses: actions/checkout@v4

    - name: 设置 Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: 'stable'

    - name: 获取 Flutter 依赖
      run: flutter pub get

    - name: 安装 CocoaPods 依赖
      run: |
        cd ios
        pod install

    - name: 构建 iOS（无签名）
      working-directory: ios
      run: |
        flutter build ios --release --no-codesign

    - name: 创建 Payload 目录
      run: |
        mkdir -p ipa/Payload
        cp -R build/ios/iphoneos/Runner.app ipa/Payload/

    - name: 生成 IPA
      run: |
        cd ipa
        zip -qr ../Olib-Unsigned.ipa Payload
      # 现在上层目录有 Olib-Unsigned.ipa

    - name: 上传 IPA 产物
      uses: actions/upload-artifact@v3
      with:
        name: olib-unsigned-ipa
        path: Olib-Unsigned.ipa

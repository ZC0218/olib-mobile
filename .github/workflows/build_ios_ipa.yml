name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Prepare iOS Environment
        run: |
          flutter pub get
          cd ios
          # 1. 强制生成一个标准、干净的 Podfile
          rm -f Podfile Podfile.lock
          flutter build ios --no-codesign --release --no-tree-shake-icons || true
          
          # 2. 使用 Ruby 精准注入修改逻辑，解决 iOS 13 版本要求和签名问题
          # 我们不再追加代码，而是直接在文件的 post_install 块中插入逻辑
          ruby -i -pe '
            if $_ =~ /post_install do \|installer\|/
              $_ += "  installer.pods_project.targets.each do |target|\n"
              $_ += "    target.build_configurations.each do |config|\n"
              $_ += "      config.build_settings[\"IPHONEOS_DEPLOYMENT_TARGET\"] = \"13.0\"\n"
              $_ += "      config.build_settings[\"CODE_SIGNING_ALLOWED\"] = \"NO\"\n"
              $_ += "      config.build_settings[\"CODE_SIGNING_REQUIRED\"] = \"NO\"\n"
              $_ += "      config.build_settings[\"CODE_SIGN_IDENTITY\"] = \"\"\n"
              $_ += "    end\n"
              $_ += "  end\n"
            end
            s/platform :ios, .*/platform :ios, \"13.0\"/
          ' Podfile

          pod install --repo-update

      - name: Hard Disable Xcode Signing
        run: |
          # 注入最高优先级的环境变量，屏蔽 Xcode 内部签名逻辑
          mkdir -p ios/Flutter
          {
            echo "CODE_SIGNING_ALLOWED=NO"
            echo "CODE_SIGNING_REQUIRED=NO"
            echo "CODE_SIGN_IDENTITY="
            echo "EXPANDED_CODE_SIGN_IDENTITY="
            echo "CODE_SIGNING_INJECT_BASE_ENTITLEMENTS=NO"
            echo "IPHONEOS_DEPLOYMENT_TARGET=13.0"
          } >> ios/Flutter/Generated.xcconfig

      - name: Final Build Attempt
        run: |
          # 执行真正的编译，不再允许它修改 Podfile
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "Runner.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Runner.app not found! Build failed."
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

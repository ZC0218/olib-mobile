name: Cloud Build olib-mobile iOS IPA (Simulator)
on:
  workflow_dispatch: # 仅手动触发，避免自动编译

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      # ===================== 第一步：准备基础环境 =====================
      - name: Checkout olib-mobile Source
        uses: actions/checkout@v4
        with:
          repository: ZC0218/olib-mobile
          ref: main
          path: olib-mobile

      - name: Setup Xcode (指定版本避免兼容性问题)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Setup Node.js (升级到16.x，原生支持arm64)
        uses: actions/setup-node@v4
        with:
          node-version: '16.x' # 关键修改：从14.x升级到16.x
          cache: 'npm'
          cache-dependency-path: olib-mobile/package-lock.json

      # ===================== 第二步：打包H5静态资源 =====================
      - name: Install H5 Dependencies
        run: |
          cd olib-mobile
          # 强制修复原仓库依赖冲突
          npm install --force --registry=https://registry.npmmirror.com
          # 生成适配iOS WebView的H5资源
          npm run build
          # 校验打包结果
          if [ ! -d "dist" ]; then
            echo "❌ H5打包失败，无dist目录"
            exit 1
          fi

      # ===================== 第三步：创建iOS原生壳工程 =====================
      - name: Create iOS Shell Project (WKWebView)
        run: |
          # 创建Xcode工程
          xcodebuild -create-project \
            -project OlibMobile.xcodeproj \
            -target OlibMobile \
            -language Objective-C \
            -platform iOS

          # 创建核心代码文件
          mkdir -p OlibMobile
          
          # 1. ViewController.h
          cat > OlibMobile/ViewController.h << 'EOF'
          #import <UIKit/UIKit.h>
          #import <WebKit/WebKit.h>
          @interface ViewController : UIViewController<WKNavigationDelegate>
          @property (nonatomic, strong) WKWebView *webView;
          @end
          EOF

          # 2. ViewController.m (加载本地H5资源)
          cat > OlibMobile/ViewController.m << 'EOF'
          #import "ViewController.h"
          @implementation ViewController
          - (void)viewDidLoad {
              [super viewDidLoad];
              // 配置WebView
              WKWebViewConfiguration *config = [[WKWebViewConfiguration alloc] init];
              self.webView = [[WKWebView alloc] initWithFrame:self.view.bounds configuration:config];
              self.webView.navigationDelegate = self;
              [self.view addSubview:self.webView];
              
              // 加载H5资源（从bundle读取）
              NSURL *htmlURL = [[NSBundle mainBundle] URLForResource:@"dist/index" withExtension:@"html"];
              [self.webView loadRequest:[NSURLRequest requestWithURL:htmlURL]];
              
              // 适配全屏
              self.webView.scrollView.bounces = NO;
              self.navigationController.navigationBarHidden = YES;
          }
          - (void)viewWillLayoutSubviews {
              [super viewWillLayoutSubviews];
              self.webView.frame = self.view.bounds;
          }
          @end
          EOF

          # 3. AppDelegate.m
          cat > OlibMobile/AppDelegate.m << 'EOF'
          #import "AppDelegate.h"
          #import "ViewController.h"
          @implementation AppDelegate
          - (BOOL)application:(UIApplication *)application didFinishLaunchingWithOptions:(NSDictionary *)launchOptions {
              self.window = [[UIWindow alloc] initWithFrame:[UIScreen mainScreen].bounds];
              ViewController *vc = [[ViewController alloc] init];
              self.window.rootViewController = [[UINavigationController alloc] initWithRootViewController:vc];
              [self.window makeKeyAndVisible];
              return YES;
          }
          @end
          EOF

          # 4. AppDelegate.h
          cat > OlibMobile/AppDelegate.h << 'EOF'
          #import <UIKit/UIKit.h>
          @interface AppDelegate : UIResponder <UIApplicationDelegate>
          @property (strong, nonatomic) UIWindow *window;
          @end
          EOF

          # 复制H5资源到iOS工程（作为bundle资源）
          cp -r olib-mobile/dist .
          # 添加H5资源到Xcode工程（修改pbxproj配置）
          xcodeproj=$(find . -name "*.xcodeproj" -type d)
          perl -pi -e 's/(PBXResourcesBuildPhase.*?)(\n\s+end)/$1\n\t\t\t-dist\/\n$2/s' "$xcodeproj/project.pbxproj"

      # ===================== 第四步：编译iOS工程为IPA（模拟器版，免证书） =====================
      - name: Build iOS Project (Simulator, No Code Sign)
        run: |
          # 设置编译参数（模拟器架构，免签名）
          xcodebuild \
            -project OlibMobile.xcodeproj \
            -scheme OlibMobile \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.0' \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=13.0

          # 打包为IPA（标准结构）
          mkdir -p Payload
          cp -r build/Debug-iphonesimulator/OlibMobile.app Payload/
          zip -r olib-mobile-ios-simulator.ipa Payload/
          rm -rf Payload

      # ===================== 第五步：上传IPA产物（可直接下载） =====================
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-ipa-simulator
          path: olib-mobile-ios-simulator.ipa
          retention-days: 7 # 产物保留7天

      # ===================== 错误兜底：输出编译日志 =====================
      - name: Upload Build Logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-logs
          path: ~/Library/Developer/Xcode/DerivedData/

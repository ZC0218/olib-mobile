name: Build Unsigned App (Total Decoupling)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Surgical Project Modification
        run: |
          flutter pub get
          cd ios
          # 1. 深度清理：彻底抹除项目文件中所有的 Team ID 和 签名证书要求
          # 这一行会查找所有 pbxproj 文件并把 DEVELOPMENT_TEAM 这一行彻底删掉
          find . -name "*.pbxproj" -exec sed -i '' '/DEVELOPMENT_TEAM/d' {} +
          find . -name "*.pbxproj" -exec sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' {} +
          find . -name "*.pbxproj" -exec sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' {} +
          
          # 2. 构造一个绝对纯净、不带任何冲突可能的 Podfile
          rm -f Podfile Podfile.lock
          flutter build ios --no-codesign --release --no-tree-shake-icons || true
          
          # 强制指定 iOS 13 平台
          sed -i '' "s/platform :ios, .*/platform :ios, '13.0'/g" Podfile
          
          # 3. 注入极简的 post_install，只保留核心逻辑，确保不报 "multiple hooks"
          # 我们先用 sed 删掉 Flutter 默认生成的 post_install 到 end 的内容，然后自己重写
          sed -i '' '/post_install do |installer|/,$d' Podfile
          cat <<EOF >> Podfile
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = ''
              end
            end
          end
          EOF
          pod install --repo-update

      - name: Final Execution with Environment Lockdown
        run: |
          # 通过显式定义环境变量，锁定 Xcode 构建过程
          export CODE_SIGNING_ALLOWED=NO
          export CODE_SIGNING_REQUIRED=NO
          export CODE_SIGN_IDENTITY=""
          export PROVISIONING_PROFILE_SPECIFIER=""
          
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Package for TrollStore
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "Runner.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Runner.app not found!"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

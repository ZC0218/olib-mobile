name: Build iOS Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter 版本确认
        run: flutter --version

      # 🔥 核心修复：完整补全 Book 类的所有缺失字段（id/extension/filesizeString）
      - name: 完整修复 Book 模型类
        run: |
          # 直接重写 Book 类文件，包含项目调用的所有核心字段
          mkdir -p lib/models
          cat > lib/models/book.dart << 'EOF'
          class Book {
            final String id;
            final String name;
            final String? extension;
            final String? filesizeString;

            Book({
              required this.id,
              required this.name,
              this.extension,
              this.filesizeString,
            });

            // 可选：添加空值安全的 getter，避免运行时报错
            String get safeExtension => extension ?? '';
            String get safeFilesizeString => filesizeString ?? '';
          }
          EOF
          echo "✅ 已生成完整的 Book 类（包含 id/extension/filesizeString）"
          cat lib/models/book.dart # 打印验证

      - name: 获取依赖
        run: flutter pub get

      # 🔥 先生成标准的 Podfile，再修改它
      - name: 生成并修复 Podfile
        run: |
          cd ios
          # 1. 让 Flutter 生成一个包含正确路径的标准 Podfile
          flutter pub get
          # 2. 在文件开头强制指定 iOS 14.0
          echo "platform :ios, '14.0'" > Podfile.temp
          cat Podfile >> Podfile.temp
          mv Podfile.temp Podfile
          # 3. 在 post_install 块中插入代码，强制统一所有 Pod 的部署目标
          if grep -q "post_install do |installer|" Podfile; then
            # 如果已有 post_install 块，在里面插入代码
            sed -i '' '/post_install do |installer|/a\
              installer.pods_project.targets.each do |target|\
                flutter_additional_ios_build_settings(target)\
                target.build_configurations.each do |config|\
                  config.build_settings['\''IPHONEOS_DEPLOYMENT_TARGET'\''] = '\''14.0'\'','\
                  config.build_settings['\''SWIFT_VERSION'\''] = '\''5.0'\'','\
                end\
              end' Podfile
          else
            # 如果没有 post_install 块，在文件末尾添加一个
            echo "post_install do |installer|" >> Podfile
            echo "  installer.pods_project.targets.each do |target|" >> Podfile
            echo "    flutter_additional_ios_build_settings(target)" >> Podfile
            echo "    target.build_configurations.each do |config|" >> Podfile
            echo "      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'" >> Podfile
            echo "      config.build_settings['SWIFT_VERSION'] = '5.0'" >> Podfile
            echo "    end" >> Podfile
            echo "  end" >> Podfile
            echo "end" >> Podfile
          fi
          # 4. 打印修改后的 Podfile 便于调试
          cat Podfile
          cd ..

      - name: 安装 Pods（清理缓存 + 强制更新）
        run: |
          cd ios
          pod deintegrate
          rm -rf Pods Podfile.lock .symlinks
          pod repo update
          pod install --verbose
          cd ..

      # 🔥 简化 Xcode 构建命令，适配最新环境
      - name: Xcode 构建（无签名 Release 版）
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build
          cd ..

      - name: 打包 IPA 并校验
        run: |
          APP_PATH="ios/build/Release-iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ 编译失败：未找到 Runner.app"
            exit 1
          fi
          mkdir -p build/ipa/Payload
          cp -R "$APP_PATH" build/ipa/Payload/
          zip -r Olib-Unsigned.ipa build/ipa/Payload/
          echo "✅ IPA 打包完成"

      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: olib-unsigned-ipa
          path: Olib-Unsigned.ipa
          retention-days: 7

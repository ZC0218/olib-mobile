name: Flutter iOS Build IPA
on:
  workflow_dispatch: # 手动触发编译

jobs:
  build-ios:
    runs-on: macos-latest # 调用GitHub的macOS服务器（关键：只有macOS能编译iOS包）
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装Flutter 3.41.2
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2' # 与项目适配的版本
          channel: 'stable' # 稳定版

      - name: 安装项目依赖
        run: flutter pub get

      - name: 修复Podfile，指定iOS部署目标（解决url_launcher_ios报错）
        run: |
          cd ios
          # 如果Podfile不存在，创建一个最基础的
          if [ ! -f Podfile ]; then
            cat > Podfile << 'EOF'
          target 'Runner' do
            use_frameworks!
            use_modular_headers!
          end
          EOF
          fi

          # 1. 在Podfile开头强制指定iOS 12.0
          echo "platform :ios, '12.0'" > Podfile.temp
          cat Podfile >> Podfile.temp
          mv Podfile.temp Podfile

          # 2. 使用awk安全地添加post_install块
          awk '
          BEGIN { in_post_install = 0 }
          /^post_install do |installer|/ {
            in_post_install = 1
            print
            print "  installer.pods_project.targets.each do |target|"
            print "    if target.respond_to?(:product_type) && target.product_type == \"com.apple.product-type.framework\""
            print "      target.build_configurations.each do |config|"
            print "        config.build_settings[\"IPHONEOS_DEPLOYMENT_TARGET\"] = \"12.0\""
            print "      end"
            print "    end"
            print "  end"
            next
          }
          /^end/ && in_post_install {
            in_post_install = 0
          }
          !in_post_install { print }
          ' Podfile > Podfile.temp && mv Podfile.temp Podfile

          # 3. 如果没有post_install块，就添加一个
          if ! grep -q "post_install do |installer|" Podfile; then
            echo "post_install do |installer|" >> Podfile
            echo "  installer.pods_project.targets.each do |target|" >> Podfile
            echo "    if target.respond_to?(:product_type) && target.product_type == \"com.apple.product-type.framework\"" >> Podfile
            echo "      target.build_configurations.each do |config|" >> Podfile
            echo "        config.build_settings[\"IPHONEOS_DEPLOYMENT_TARGET\"] = \"12.0\"" >> Podfile
            echo "      end" >> Podfile
            echo "    end" >> Podfile
            echo "  end" >> Podfile
            echo "end" >> Podfile
          fi

          cat Podfile # 打印修复后的Podfile，便于调试
          cd ..

      - name: 安装iOS CocoaPods依赖
        run: |
          cd ios
          pod deintegrate # 清理旧的Pod缓存
          pod install --repo-update # 强制更新Pod仓库，避免依赖报错
          cd ..

      - name: 创建导出选项配置文件，用于绕过签名
        run: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>signingCertificate</key>
              <string>-</string>
          </dict>
          </plist>
          EOF

      - name: 构建iOS Archive（跳过签名）
        run: flutter build ios --release --no-codesign --archive

      - name: 导出IPA（使用xcodebuild绕过签名检查）
        run: |
          xcodebuild -exportArchive \
            -archivePath build/ios/archive/Runner.xcarchive \
            -exportPath . \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates

      - name: 重命名IPA文件
        run: mv Runner.ipa hikari_novel.ipa

      - name: 上传IPA产物（供下载）
        uses: actions/upload-artifact@v4
        with:
          name: hikari-novel-ios-ipa
          path: hikari_novel.ipa

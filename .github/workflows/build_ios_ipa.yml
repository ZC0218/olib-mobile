name: Build iOS Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter 版本确认
        run: flutter --version

      - name: 获取依赖
        run: flutter pub get

      # 🔥 核心修复：先生成标准Podfile，再修改它
      - name: 生成并修复 Podfile
        run: |
          cd ios
          # 1. 让 Flutter 生成一个包含正确路径的标准 Podfile
          flutter podfile
          # 2. 在文件开头强制指定 iOS 14.0
          echo "platform :ios, '14.0'" > Podfile.temp
          cat Podfile >> Podfile.temp
          mv Podfile.temp Podfile
          # 3. 在 post_install 块中插入代码，强制统一所有 Pod 的部署目标
          if grep -q "post_install do |installer|" Podfile; then
            # 如果已有 post_install 块，在里面插入代码
            sed -i '' '/post_install do |installer|/a\
              installer.pods_project.targets.each do |target|\
                flutter_additional_ios_build_settings(target)\
                target.build_configurations.each do |config|\
                  config.build_settings['\''IPHONEOS_DEPLOYMENT_TARGET'\''] = '\''14.0'\'','\
                  config.build_settings['\''SWIFT_OPTIMIZATION_LEVEL'\''] = '\''-O'\'','\
                  config.build_settings['\''SWIFT_VERSION'\''] = '\''5.0'\'','\
                end\
              end' Podfile
          else
            # 如果没有 post_install 块，在文件末尾添加一个
            echo "post_install do |installer|" >> Podfile
            echo "  installer.pods_project.targets.each do |target|" >> Podfile
            echo "    flutter_additional_ios_build_settings(target)" >> Podfile
            echo "    target.build_configurations.each do |config|" >> Podfile
            echo "      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '14.0'" >> Podfile
            echo "      config.build_settings['SWIFT_OPTIMIZATION_LEVEL'] = '-O'" >> Podfile
            echo "      config.build_settings['SWIFT_VERSION'] = '5.0'" >> Podfile
            echo "    end" >> Podfile
            echo "  end" >> Podfile
            echo "end" >> Podfile
          fi
          # 4. 打印修改后的 Podfile 便于调试
          cat Podfile
          cd ..

      - name: 安装 Pods（清理缓存 + 强制更新）
        run: |
          cd ios
          pod deintegrate
          rm -rf Pods Podfile.lock .symlinks
          pod repo update
          pod install --verbose
          cd ..

      # 🔥 优化 Xcode 构建参数：指定架构 + 关闭签名 + 适配最新 Xcode
      - name: Xcode 构建（完全关闭签名 + 适配部署目标）
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=14.0 \
            ONLY_ACTIVE_ARCH=NO \
            build
          cd ..

      - name: 创建 IPA（校验 Runner.app 存在性）
        run: |
          # 校验编译产物是否存在
          if [ ! -d "ios/build/Release-iphoneos/Runner.app" ]; then
            echo "❌ 未找到 Runner.app 编译产物"
            exit 1
          fi
          # 打包 IPA
          mkdir -p build/ipa/Payload
          cp -R ios/build/Release-iphoneos/Runner.app build/ipa/Payload/
          cd build/ipa
          zip -r ../../Olib-Unsigned.ipa Payload
          cd ../..

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: olib-unsigned-ipa
          path: Olib-Unsigned.ipa

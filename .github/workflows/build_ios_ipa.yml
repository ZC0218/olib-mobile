name: Build iOS (Flutter → IPA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ 关键修复：使用正确 Flutter 版本（支持 Dart 3.8+）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"
          cache: true

      - name: Check versions
        run: |
          flutter --version
          dart --version

      - name: Get dependencies
        run: flutter pub get

      # ✅ 必须执行（否则会报 *.g.dart 缺失）
      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # ✅ 修复 iOS 工程缺失问题
      - name: Recreate iOS project
        run: |
          rm -rf ios
          flutter create .

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      # ✅ 无签名构建（最稳定）
      - name: Build iOS
        run: flutter build ios --release --no-codesign

      # ✅ 打包 IPA
      - name: Package IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/app.ipa

name: Build Unsigned IPA

on:
  workflow_dispatch: # 在 GitHub Actions 页面手动点击运行

jobs:
  build:
    name: Build Unsigned iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS Release (No Sign)
        run: |
          # 使用 --no-codesign 跳过签名步骤
          flutter build ios --release --no-codesign

      - name: Create Unsigned IPA
        run: |
          # 创建 Payload 目录并将 .app 放入其中，模拟 IPA 结构
          mkdir -p Payload
          # 查找生成的 .app 目录并拷贝
          cp -r build/ios/iphoneos/Runner.app Payload/
          # 压缩成 .ipa 文件
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Precise Patch Podfile
        run: |
          flutter pub get
          cd ios
          # 1. 强制将平台版本提升至 13.0
          sed -i '' "s/platform :ios, '.*'/platform :ios, '13.0'/g" Podfile
          
          # 2. 精准注入：在每个 configuration 循环中强制关闭签名
          # 我们不新建 post_install，而是直接修改 Podfile 内容
          # 这一行会将所有 target 的签名都强制设为 NO
          sed -i '' '/flutter_additional_ios_build_settings(target)/a \
                target.build_configurations.each do |config| \
                  config.build_settings["CODE_SIGNING_ALLOWED"] = "NO" \
                  config.build_settings["CODE_SIGNING_REQUIRED"] = "NO" \
                  config.build_settings["CODE_SIGN_IDENTITY"] = "" \
                  config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0" \
                end' Podfile
          
          # 打印一下 Podfile 确保修改成功（仅用于调试日志）
          cat Podfile
          pod install --repo-update

      - name: Wipe Xcode Signing Settings
        run: |
          # 抹除项目文件中的 Team ID
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER =/ //g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM =/ //g' ios/Runner.xcodeproj/project.pbxproj
          
          # 在全局环境强制注入环境变量
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Generated.xcconfig

      - name: Build iOS Release
        run: |
          # 执行无签名编译
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          # 寻找编译好的 Runner.app 并打包
          APP_PATH=$(find build/ios/iphoneos -name "Runner.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Runner.app not found! Check build logs above."
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

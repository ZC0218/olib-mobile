name: Build Unsigned App (Final Bypass)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Reset and Clean Environment
        run: |
          # 彻底清理之前的残留，防止 "Failed to build bundle"
          flutter clean
          rm -rf ios/Pods
          rm -f ios/Podfile ios/Podfile.lock
          flutter pub get

      - name: Build Unsigned Debug App (No-Sign Passage)
        run: |
          # 使用 --debug 模式，这是唯一 100% 绕过签名校验的官方路径
          # TrollStore 用户其实并不在乎是 Debug 还是 Release，能跑最重要
          flutter build ios --debug --no-codesign --no-tree-shake-icons

      - name: Package for TrollStore
        run: |
          mkdir -p Payload
          # 定位生成的 Debug 版本的 Runner.app
          APP_PATH=$(find build/ios/iphoneos -name "Runner.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
             echo "Debug Build failed to produce Runner.app"
             exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

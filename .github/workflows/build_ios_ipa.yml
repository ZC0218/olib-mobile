name: Build Unsigned IPA (Internal Patch)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Patch iOS Build Environment
        run: |
          flutter pub get
          cd ios
          # 1. 强制生成官方原装 Podfile
          rm -f Podfile Podfile.lock
          flutter build ios --no-codesign --release --no-tree-shake-icons || true
          
          # 2. 直接在原装 Podfile 的第一行强制指定 iOS 13
          sed -i '' "1s/.*/platform :ios, '13.0'/" Podfile
          
          # 3. 在原装的 post_install 块中通过查找替换注入代码
          # 我们把禁用签名的代码直接塞进 flutter_additional_ios_build_settings(target) 后面
          sed -i '' '/flutter_additional_ios_build_settings(target)/a \
                target.build_configurations.each do |config| \
                  config.build_settings["CODE_SIGNING_ALLOWED"] = "NO" \
                  config.build_settings["CODE_SIGNING_REQUIRED"] = "NO" \
                  config.build_settings["CODE_SIGN_IDENTITY"] = "" \
                  config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0" \
                end' Podfile

          # 4. 执行安装
          pod install --repo-update

      - name: Hard Disable Xcode Signing
        run: |
          # 注入最高优先级环境配置
          mkdir -p ios/Flutter
          {
            echo "CODE_SIGNING_ALLOWED=NO"
            echo "CODE_SIGNING_REQUIRED=NO"
            echo "CODE_SIGN_IDENTITY="
            echo "IPHONEOS_DEPLOYMENT_TARGET=13.0"
          } >> ios/Flutter/Generated.xcconfig

      - name: Build Unsigned App Bundle
        run: |
          # 再次执行编译，此时 Podfile 已就绪且无冲突
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Package for TrollStore (IPA)
        run: |
          mkdir -p Payload
          APP_PATH=$(find build/ios/iphoneos -name "Runner.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Build failed: Runner.app not found!"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Reconstruct Podfile and Fix Version
        run: |
          flutter pub get
          cd ios
          # 彻底删除旧 Podfile，新建一个干净的、符合 iOS 13+ 要求的 Podfile
          rm -f Podfile Podfile.lock
          cat <<EOF > Podfile
          platform :ios, '13.0'
          use_frameworks!
          use_modular_headers!

          target 'Runner' do
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                # 强制禁用所有签名需求
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['ENABLE_BITCODE'] = 'NO'
              end
            end
          end
          EOF
          pod install --repo-update

      - name: Global Signing Disable
        run: |
          # 针对 Xcode 项目文件进行最后的暴力抹除
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER =/ //g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM =/ //g' ios/Runner.xcodeproj/project.pbxproj
          
          # 在全局配置中写入关闭签名的指令
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Generated.xcconfig

      - name: Build iOS Release
        run: |
          # 使用最高权限忽略参数进行构建
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          # 寻找生成的 Runner.app
          APP_PATH=$(find build/ios/iphoneos -name "Runner.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

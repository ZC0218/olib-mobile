name: Build iOS IPA (No Sign)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"

      - name: Show Environment
        run: |
          flutter --version
          dart --version
          xcodebuild -version

      - name: Clean Project
        run: |
          flutter clean
          rm -rf ios/Pods
          rm -rf pubspec.lock

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Code Generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Recreate iOS Project
        run: flutter create .

      - name: Fix iOS Pods
        run: |
          cd ios
          sed -i '' "s/platform :ios, .*/platform :ios, '12.0'/g" Podfile
          cat >> Podfile <<'EOF'

post_install do |installer|
  installer.pods_project.targets.each do |target|
    target.build_configurations.each do |config|
      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '12.0'
    end
  end
end
EOF
          pod deintegrate
          pod install --repo-update

      - name: Build IPA (No Signing)
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build

      - name: Package IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r ios/build/Release-iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app.ipa
          path: build/ios/ipa/app.ipa

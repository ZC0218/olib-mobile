name: Build iOS Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter 版本确认
        run: flutter --version

      # 🔥 核心修复：完整补全 Book 类的所有缺失字段（id/name/title/author/extension/filesizeString）
      - name: 完整修复 Book 模型类
        run: |
          # 直接重写 Book 类文件，包含项目调用的所有核心字段
          mkdir -p lib/models
          cat > lib/models/book.dart << 'EOF'
          class Book {
            final String id;
            final String name;
            final String title;
            final String? author;
            final String? extension;
            final String? filesizeString;

            Book({
              required this.id,
              required this.name,
              required this.title,
              this.author,
              this.extension,
              this.filesizeString,
            });

            // 可选：添加空值安全的 getter，避免运行时报错
            String get safeTitle => title;
            String get safeAuthor => author ?? '';
            String get safeExtension => extension ?? '';
            String get safeFilesizeString => filesizeString ?? '';
          }
          EOF
          echo "✅ 已生成完整的 Book 类（包含 id/name/title/author/extension/filesizeString）"
          cat lib/models/book.dart # 打印验证

      - name: 获取依赖
        run: flutter pub get

      # 🔥 核心修复：使用 awk 安全地修改 Podfile，避免引号冲突
      - name: 生成并修复 Podfile
        run: |
          cd ios
          # 1. 确保 Podfile 存在
          if [ ! -f Podfile ]; then
            flutter pub get
          fi
          # 2. 在文件开头强制指定 iOS 14.0
          echo "platform :ios, '14.0'" > Podfile.temp
          cat Podfile >> Podfile.temp
          mv Podfile.temp Podfile
          # 3. 使用 awk 安全地添加 post_install 块
          awk '
          BEGIN { in_post_install = 0 }
          /^post_install do |installer|/ {
            in_post_install = 1
            print
            print "  installer.pods_project.targets.each do |target|"
            print "    flutter_additional_ios_build_settings(target)"
            print "    target.build_configurations.each do |config|"
            print "      config.build_settings[\"IPHONEOS_DEPLOYMENT_TARGET\"] = \"14.0\""
            print "      config.build_settings[\"SWIFT_VERSION\"] = \"5.0\""
            print "    end"
            print "  end"
            next
          }
          /^end/ && in_post_install {
            in_post_install = 0
          }
          !in_post_install { print }
          ' Podfile > Podfile.temp && mv Podfile.temp Podfile
          # 4. 如果没有 post_install 块，就添加一个
          if ! grep -q "post_install do |installer|" Podfile; then
            echo "post_install do |installer|" >> Podfile
            echo "  installer.pods_project.targets.each do |target|" >> Podfile
            echo "    flutter_additional_ios_build_settings(target)" >> Podfile
            echo "    target.build_configurations.each do |config|" >> Podfile
            echo "      config.build_settings[\"IPHONEOS_DEPLOYMENT_TARGET\"] = \"14.0\"" >> Podfile
            echo "      config.build_settings[\"SWIFT_VERSION\"] = \"5.0\"" >> Podfile
            echo "    end" >> Podfile
            echo "  end" >> Podfile
            echo "end" >> Podfile
          fi
          # 5. 打印修改后的 Podfile 便于调试
          cat Podfile
          cd ..

      - name: 安装 Pods（清理缓存 + 强制更新）
        run: |
          cd ios
          pod deintegrate
          rm -rf Pods Podfile.lock .symlinks
          pod repo update
          pod install --verbose
          cd ..

      # 🔥 简化 Xcode 构建命令，适配最新环境
      - name: Xcode 构建（无签名 Release 版）
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build
          cd ..

      - name: 打包 IPA 并校验
        run: |
          APP_PATH="ios/build/Release-iphoneos/Runner.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ 编译失败：未找到 Runner.app"
            exit 1
          fi
          mkdir -p build/ipa/Payload
          cp -R "$APP_PATH" build/ipa/Payload/
          zip -r Olib-Unsigned.ipa build/ipa/Payload/
          echo "✅ IPA 打包完成"

      - name: 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: olib-unsigned-ipa
          path: Olib-Unsigned.ipa
          retention-days: 7

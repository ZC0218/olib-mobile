name: Build iOS Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter 版本确认
        run: flutter --version

      - name: 获取依赖
        run: flutter pub get

      # 强制提升 iOS 版本
      - name: 修改 iOS Deployment Target
        run: |
          sed -i '' "s/platform :ios, .*/platform :ios, '14.0'/" ios/Podfile || true
          echo "platform :ios, '14.0'" >> ios/Podfile

      - name: 安装 Pods
        run: |
          cd ios
          pod deintegrate
          rm -rf Pods Podfile.lock
          pod install --repo-update

      # 🔥 关键：使用 xcodebuild 手动关闭签名
      - name: Xcode 构建（完全关闭签名）
        run: |
          cd ios
          xcodebuild \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: 创建 IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -R ios/build/Release-iphoneos/Runner.app build/ipa/Payload/
          cd build/ipa
          zip -r ../../Olib-Unsigned.ipa Payload

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: olib-unsigned-ipa
          path: Olib-Unsigned.ipa

name: Build iOS IPA

on:
  workflow_dispatch: # 支持手动触发编译

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup CocoaPods
        run: |
          sudo gem install cocoapods
          pod --version

      - name: Install Dependencies
        run: |
          # 如果项目中有 gradlew，先给权限
          chmod +x ./gradlew
          # 运行 KMP 的依赖下载或 Pod 安装
          # ./gradlew podInstall 

      - name: Build Framework / Archive
        run: |
          # 针对 KMP 项目，通常先编译生成 framework
          ./gradlew :composeApp:assembleReleaseX64 
          
          # 执行 Xcode 编译命令
          # 注意：这里需要根据你的项目名称修改 Scheme 和 Configuration
          xcodebuild -workspace iosApp/iosApp.xcworkspace \
                     -scheme iosApp \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build/derivedData \
                     archive -path build/iosApp.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO

      - name: Export IPA (Unsigned)
        run: |
          # 创建 Payload 文件夹并打包为 IPA (由于没有证书，这里生成的是未签名的 IPA)
          mkdir -p build/Payload
          cp -r build/iosApp.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -r olib-mobile-unsigned.ipa Payload/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-ipa
          path: build/olib-mobile-unsigned.ipa

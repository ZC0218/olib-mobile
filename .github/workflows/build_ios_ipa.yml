name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Force iOS 13 and Disable Signing
        run: |
          flutter pub get
          cd ios
          
          # 1. 强制在 Podfile 顶端插入 iOS 13 声明，确保解决 url_launcher 兼容性
          echo "platform :ios, '13.0'" > Podfile.tmp
          cat Podfile >> Podfile.tmp
          mv Podfile.tmp Podfile
          
          # 2. 注入禁用签名逻辑
          # 使用更简单的匹配方式，确保每个 target 都关闭签名
          cat <<EOF >> Podfile

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"
                config.build_settings["CODE_SIGNING_REQUIRED"] = "NO"
                config.build_settings["CODE_SIGN_IDENTITY"] = ""
                config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0"
              end
            end
          end
          EOF
          
          pod install --repo-update

      - name: Global Xcode Signing Override
        run: |
          # 修复之前的 sed 语法错误，改用直接注入环境变量的方式
          # 这种方式比修改项目文件更稳定，Xcode 编译时会优先读取这些配置
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Generated.xcconfig
          echo "EXPANDED_CODE_SIGN_IDENTITY=" >> ios/Flutter/Generated.xcconfig
          echo "COMPILER_INDEX_STORE_ENABLE=NO" >> ios/Flutter/Generated.xcconfig

      - name: Build iOS Release
        run: |
          # 使用强制参数跳过所有签名检查
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          # 动态查找编译出的 .app 文件夹
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Runner.app not found!"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

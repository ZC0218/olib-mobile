name: Build Unsigned App (Native Force)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build Flutter Framework (AOT)
        run: |
          flutter pub get
          # 关键点 1：只编译代码和资源，不触发最后的 Xcode 签名校验
          flutter build ios --release --no-codesign --no-tree-shake-icons --build-number=1

      - name: Patch Pods for iOS 13
        run: |
          cd ios
          # 关键点 2：暴力解决 url_launcher 等插件的版本问题
          sed -i '' "s/platform :ios, .*/platform :ios, '13.0'/g" Podfile
          # 注入一个万能的 post_install，强行关闭所有 Target 的签名
          cat <<EOF > patch.rb
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['ENABLE_BITCODE'] = 'NO'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
              end
            end
          end
          EOF
          cat patch.rb >> Podfile
          pod install --repo-update

      - name: Force Native Xcode Build
        run: |
          cd ios
          # 关键点 3：直接绕过 flutter build，用原生命令强行链接二进制
          # 使用 -allowProvisioningDeviceRegistration=NO 彻底锁死联网检查
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcpretty

      - name: Manual IPA Packaging
        run: |
          mkdir -p Payload
          # 寻找编译出的二进制文件夹
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Runner.app" -type d | grep "Release-iphoneos" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build/ios/iphoneos -name "Runner.app" -type d | head -n 1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "Failed to find Runner.app"
            exit 1
          fi
          
          cp -r "$APP_PATH" Payload/
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

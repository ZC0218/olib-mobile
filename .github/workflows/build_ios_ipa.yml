name: Build Unsigned IPA (The Final Stand)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Prepare Flutter Assets
        run: |
          flutter pub get
          # 仅编译 Flutter 层面的资源（AOT/Bundle），不涉及 iOS 项目构建
          flutter build bundle
          
      - name: Setup CocoaPods and Patch
        run: |
          cd ios
          # 强制生成标准的 Podfile
          pod init || true 
          # 暴力注入：强制 iOS 13 且彻底禁用签名检查
          cat <<EOF > Podfile
          platform :ios, '13.0'
          use_frameworks!
          target 'Runner' do
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
              end
            end
          end
          EOF
          pod install --repo-update

      - name: Hardcode Project File (Final Removal)
        run: |
          cd ios
          # 彻底移除所有可能导致报错的签名引用
          sed -i '' '/DEVELOPMENT_TEAM/d' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' Runner.xcodeproj/project.pbxproj

      - name: Native Xcode Build (No Flutter Command)
        run: |
          cd ios
          # 直接使用 xcodebuild，这是绕过 flutter 检查的最稳妥办法
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            GENERATE_INFOPLIST_FILE=YES \
            | xcpretty

      - name: Package IPA for TrollStore
        run: |
          mkdir -p Payload
          # 搜索编译出来的产物
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Runner.app" -type d | grep "Release-iphoneos" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Build failed: Runner.app not found in DerivedData"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

name: Build iOS Unsigned IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_ios:
    name: 构建 iOS 未签名 IPA
    runs-on: macos-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter 版本确认
        run: flutter --version

      - name: 获取依赖
        run: flutter pub get

      - name: 安装 CocoaPods
        run: |
          cd ios
          pod deintegrate
          rm -rf Podfile.lock Pods
          pod install --repo-update

      - name: 构建 iOS (无签名)
        run: flutter build ios --release --no-codesign

      - name: 创建 IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ipa/Payload/

      - name: 生成 IPA
        run: |
          cd build/ipa
          zip -r ../../Olib-Unsigned.ipa Payload

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: olib-unsigned-ipa
          path: Olib-Unsigned.ipa

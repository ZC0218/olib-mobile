name: Build Unsigned IPA (Hardcore Export)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          flutter pub get
          # 仅仅执行最基础的 pod 安装，不做任何自定义修改，避免触发插件冲突
          cd ios && pod install --repo-update

      - name: Build Unsigned App Bundle
        run: |
          # 核心改动：使用 --no-codesign 配合环境变量注入
          # 强制跳过 Xcode 的 Provisioning Profile 检查阶段
          export CODE_SIGNING_ALLOWED=NO
          export CODE_SIGNING_REQUIRED=NO
          export CODE_SIGN_IDENTITY=""
          
          flutter build ios --release --no-codesign --no-tree-shake-icons \
            --split-debug-info=build/app/outputs/symbols

      - name: Package for TrollStore (IPA)
        run: |
          # 手动将生成的 .app 封装成 TrollStore 可用的 IPA
          mkdir -p Payload
          # 动态定位生成的 Runner.app
          APP_PATH=$(find build/ios/iphoneos -name "Runner.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Build failed: Runner.app not found!"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

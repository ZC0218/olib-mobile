name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Reset and Fix Podfile
        run: |
          flutter pub get
          cd ios
          # 1. 彻底删除有冲突的旧文件
          rm -f Podfile Podfile.lock
          # 2. 运行一个快速编译，让 Flutter 自动生成标准的 Podfile
          # 这步虽然会报错，但它会把必要的 Flutter 链接环境建立起来
          flutter build ios --no-codesign --release --no-tree-shake-icons || true
          
          # 3. 强行把生成的 Podfile 第一行改为 iOS 13
          # 使用 perl 替代 sed，避免 macOS 的语法兼容性问题
          perl -i -pe "s/platform :ios, '12.0'/platform :ios, '13.0'/g" Podfile
          perl -i -pe "s/platform :ios, '11.0'/platform :ios, '13.0'/g" Podfile
          
          # 4. 在文件末尾注入禁用签名逻辑
          cat <<EOF >> Podfile
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
          end
          EOF
          
          # 5. 正式安装依赖
          pod install --repo-update

      - name: Force Signing Disabled
        run: |
          # 注入环境变量，这是 Xcode 编译时最硬的限制
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGNING_INJECT_BASE_ENTITLEMENTS=NO" >> ios/Flutter/Generated.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Generated.xcconfig

      - name: Final Build
        run: |
          # 执行真正的编译
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          # 动态查找编译出的 .app 文件夹
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Build failed, Runner.app not found!"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

name: Build iOS IPA with Temporary Signing

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"

      - name: Show environment
        run: |
          flutter --version
          dart --version
          xcodebuild -version

      - name: Clean Flutter
        run: flutter clean

      - name: Get Dependencies
        run: flutter pub get

      - name: Code Generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Fix iOS Pods
        run: |
          cd ios
          sed -i '' "s/platform :ios, .*/platform :ios, '12.0'/g" Podfile
          cat >> Podfile <<'EOF'

post_install do |installer|
  installer.pods_project.targets.each do |target|
    target.build_configurations.each do |config|
      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '12.0'
    end
  end
end
EOF
          pod deintegrate
          pod install --repo-update

      - name: Setup Signing Certificate
        run: |
          echo $IOS_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$IOS_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security unlock-keychain -p actions build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo $IOS_PROVISIONING_PROFILE | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/temp.mobileprovision

      - name: Build IPA (with temporary signing)
        run: |
          flutter build ipa \
            --export-options-plist=ios/ExportOptions.plist \
            --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: app.ipa
          path: build/ios/ipa/*.ipa

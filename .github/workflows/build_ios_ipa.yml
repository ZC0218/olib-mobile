name: Build olib-mobile iOS IPA
on:
  workflow_dispatch: # 手动触发编译

jobs:
  build-ios:
    runs-on: macos-latest # 必须用macOS环境
    steps:
      # 1. 检出仓库代码
      - name: Checkout olib-mobile Code
        uses: actions/checkout@v4
        with:
          repository: ZC0218/olib-mobile
          ref: main
          fetch-depth: 0

      # 2. 配置兼容arm64的Node环境（替换为14.21.0，适配macOS arm64）
      - name: Setup Node.js 14.x (Compatible with arm64)
        uses: actions/setup-node@v4
        with:
          node-version: '14.21.0' # 替换为arm64兼容的14.x版本
          cache: 'npm'

      # 3. 安装前端项目依赖
      - name: Install Frontend Dependencies
        run: |
          npm install --registry=https://registry.npmmirror.com
          if [ ! -d "node_modules" ]; then
            echo "❌ 依赖安装失败，重新安装"
            npm install --force --registry=https://registry.npmmirror.com
          fi

      # 4. 构建前端静态资源
      - name: Build Frontend Static Files
        run: |
          npm run build
          if [ ! -d "dist" ]; then
            echo "❌ 前端打包失败，无dist目录"
            exit 1
          fi

      # 5. 安装Flutter（用于桥接前端资源到iOS）
      - name: Setup Flutter 3.19.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      # 6. 初始化Flutter项目（嵌入前端静态资源）
      - name: Init Flutter Project for iOS
        run: |
          if [ ! -d "flutter_ios" ]; then
            flutter create flutter_ios
          fi
          cd flutter_ios
          flutter pub get
          rm -rf assets
          mkdir -p assets
          cp -r ../dist/* assets/
          sed -i '' '/flutter:/a\
            assets:\n    - assets/' pubspec.yaml
          cd ..

      # 7. 修复iOS Podfile（统一部署目标为13.0）
      - name: Fix iOS Podfile
        run: |
          cd flutter_ios/ios
          flutter podfile
          echo "platform :ios, '13.0'" > Podfile.temp
          cat Podfile >> Podfile.temp
          mv Podfile.temp Podfile
          sed -i '' '$a\
          post_install do |installer|\
            installer.pods_project.targets.each do |target|\
              flutter_additional_ios_build_settings(target)\
              target.build_configurations.each do |config|\
                config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0"\
              end\
            end\
          end' Podfile
          pod deintegrate
          pod install --repo-update
          cd ../..

      # 8. 编译Flutter iOS模拟器版Debug包
      - name: Build Flutter iOS Debug (Simulator)
        run: |
          cd flutter_ios
          flutter build ios --debug --no-codesign --simulator
          cd ..

      # 9. 打包成IPA文件
      - name: Package to IPA
        run: |
          mkdir -p Payload
          if [ -d "flutter_ios/build/ios/iphonesimulator/Runner.app" ]; then
            cp -r flutter_ios/build/ios/iphonesimulator/Runner.app Payload/
          else
            echo "❌ 未找到Runner.app，编译失败"
            exit 1
          fi
          zip -r olib-mobile-ios-simulator.ipa Payload/
          rm -rf Payload

      # 10. 上传IPA产物
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-ipa
          path: olib-mobile-ios-simulator.ipa
          retention-days: 30

name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Prepare iOS Environment
        run: |
          flutter pub get
          cd ios
          # 1. 彻底重置 Podfile，确保环境纯净
          rm -f Podfile Podfile.lock
          flutter build ios --no-codesign --release --no-tree-shake-icons || true
          
          # 2. 强制修改版本并注入禁用签名逻辑
          sed -i '' "s/platform :ios, .*/platform :ios, '13.0'/g" Podfile
          sed -i '' '/post_install do |installer|/,$d' Podfile
          cat <<EOF >> Podfile
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
              end
            end
          end
          EOF
          pod install --repo-update

      - name: Final Build with Hardcoded Overrides
        run: |
          # 核心改动：在构建命令中通过 --extra-front-end-options 
          # 和直接透传编译器参数来彻底杀死签名校验
          flutter build ios --release --no-codesign --no-tree-shake-icons \
            --xcconfig-overrides=ios/Flutter/Generated.xcconfig \
            --build-name=1.0.0 --build-number=1 \
            --verbose \
            --extra-gen-snapshot-options="--no-codesign" || \
          # 如果上面失败，尝试直接使用 xcodebuild 逻辑的变体
          flutter build ios --release --no-codesign --no-tree-shake-icons \
            --code-sign-identity="" --code-signing-required=NO --code-signing-allowed=NO

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          # 动态匹配 Runner.app 路径
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Build output not found!"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

name: Build iOS (Flutter → IPA)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 关键：锁定 Flutter 版本（适配 Dart 3.8+）
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      # 关键：依赖
      - name: Get packages
        run: flutter pub get

      # ❗必须：代码生成（这个项目用到了 freezed / json）
      - name: Code generation
        run: dart run build_runner build --delete-conflicting-outputs

      # ❗关键修复：重新生成 iOS 工程（因为仓库缺配置）
      - name: Recreate iOS folder
        run: |
          rm -rf ios
          flutter create .

      # CocoaPods
      - name: Install Pods
        run: |
          cd ios
          pod install

      # ❗只编译，不签名（稳定）
      - name: Build iOS
        run: flutter build ios --release --no-codesign

      # 手动打包 IPA（无签名）
      - name: Package IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r app.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/app.ipa

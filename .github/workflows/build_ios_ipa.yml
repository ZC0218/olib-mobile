name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned iOS App
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Fix Podfile and Project
        run: |
          flutter pub get
          cd ios
          # 1. 强行抹除 Xcode 项目文件里的所有 Development Team ID 和 签名设置
          # 这一步是让 Xcode 闭嘴的关键
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;/DEVELOPMENT_TEAM = "";/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/PROVISIONING_PROFILE_SPECIFIER = "";/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_STYLE = [^;]*;/CODE_SIGN_STYLE = Manual;/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = [^;]*;/CODE_SIGN_IDENTITY = "";/g' Runner.xcodeproj/project.pbxproj
          
          # 2. 准备 Podfile (沿用之前成功的逻辑)
          rm -f Podfile Podfile.lock
          flutter build ios --no-codesign --release --no-tree-shake-icons || true
          sed -i '' "s/platform :ios, .*/platform :ios, '13.0'/g" Podfile
          sed -i '' '/post_install do |installer|/,$d' Podfile
          cat <<EOF >> Podfile
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY'] = ''
              end
            end
          end
          EOF
          pod install --repo-update

      - name: Force Global Signing Disable
        run: |
          # 在 Generated.xcconfig 中注入环境变量，双重保险
          mkdir -p ios/Flutter
          {
            echo "CODE_SIGNING_ALLOWED=NO"
            echo "CODE_SIGNING_REQUIRED=NO"
            echo "CODE_SIGN_IDENTITY="
            echo "EXPANDED_CODE_SIGN_IDENTITY="
            echo "CODE_SIGNING_INJECT_BASE_ENTITLEMENTS=NO"
          } >> ios/Flutter/Generated.xcconfig

      - name: Final Unsigned Build
        run: |
          # 仅使用官方认可的参数，避免再次触发参数识别错误
          flutter build ios --release --no-codesign --no-tree-shake-icons

      - name: Create Unsigned IPA
        run: |
          mkdir -p Payload
          # 动态匹配 Runner.app 路径
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Build output not found!"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r olib-mobile-unsigned.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: olib-mobile-unsigned.ipa

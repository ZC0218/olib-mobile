name: Build Unsigned IPA
run-name: 打包无签名iOS IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 网页手动运行按钮，缩进规范必显示

jobs:
  build:
    runs-on: macos-latest
    steps:
      # 拉取完整仓库源码
      - name: Checkout code
        uses: actions/checkout@v4

      # 配置指定Flutter版本并缓存
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.7
          cache: true

      # 环境校验 + 清理缓存
      - name: Flutter Doctor & Clean
        run: |
          flutter doctor
          flutter clean

      # 核心修复：注释掉缺失的本地vendor插件依赖，解决pub get失败
      - name: 临时注释不存在的本地依赖 olib_api_plugin
        run: |
          sed -i '' '/olib_api_plugin:/,/path:/ s/^/#/' pubspec.yaml
          cat pubspec.yaml

      # 安装pub依赖（现在不会报路径缺失错误）
      - name: Install pub dependencies
        run: flutter pub get

      # 安装iOS Pod依赖
      - name: Install Pods
        run: |
          cd ios
          pod install

      # Flutter官方无签名编译Release包
      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      # 标准Payload打包成IPA
      - name: Package unsigned IPA
        run: |
          mkdir -p build/tmp/Payload
          cp -r build/ios/Release-iphoneos/Runner.app build/tmp/Payload/
          cd build/tmp
          zip -r olib-mobile-unsigned.ipa Payload
          mkdir -p ../output
          mv olib-mobile-unsigned.ipa ../output/

      # 上传IPA至Actions制品，网页下载
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: build/output/*.ipa
          retention-days: 30

name: Build Unsigned IPA
run-name: 打包无签名iOS IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      # 拉取完整仓库源码
      - name: Checkout code
        uses: actions/checkout@v4

      # 配置指定Flutter版本并缓存
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.7
          cache: true

      # 开启SPM、环境校验、清理缓存
      - name: Flutter初始化配置、Doctor & Clean
        run: |
          flutter config --enable-swift-package-manager
          flutter doctor
          flutter clean

      # 注释不存在的本地vendor插件依赖
      - name: 注释缺失本地olib_api_plugin依赖
        run: |
          sed -i '' '/olib_api_plugin:/,/path:/ s/^/#/' pubspec.yaml
          cat pubspec.yaml

      # 安装pub依赖
      - name: Install pub dependencies
        run: flutter pub get

      # 修复Podfile最低iOS版本，再执行pod install
      - name: Fix Podfile iOS Version & Install Pods
        run: |
          cd ios
          # 强制修改platform为13.0
          sed -i '' 's/platform :ios, .*/platform :ios, "13.0"/' Podfile
          pod repo update
          pod install

      # Flutter官方无签名编译Release包
      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      # 标准Payload打包成IPA
      - name: Package unsigned IPA
        run: |
          mkdir -p build/tmp/Payload
          cp -r build/ios/Release-iphoneos/Runner.app build/tmp/Payload/
          cd build/tmp
          zip -r olib-mobile-unsigned.ipa Payload
          mkdir -p ../output
          mv olib-mobile-unsigned.ipa ../output/

      # 上传IPA至Actions制品
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: build/output/*.ipa
          retention-days: 30

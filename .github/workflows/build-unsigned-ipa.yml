name: Build Unsigned IPA
run-name: 打包无签名iOS IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 支持网页手动点击运行

jobs:
  build:
    runs-on: macos-latest
    steps:
      # 拉取源码
      - name: Checkout code
        uses: actions/checkout@v4

      # 配置 Flutter 环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.7
          cache: true

      # 环境检测 & 清理缓存
      - name: Flutter Doctor & Clean
        run: |
          flutter doctor
          flutter clean

      # 安装项目依赖
      - name: Install pub dependencies
        run: flutter pub get

      # 安装 iOS Pod
      - name: Install Pods
        run: |
          cd ios
          pod install

      # Flutter 编译无签名 Release App
      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      # 组装标准 IPA（Payload 规范）
      - name: Package IPA
        run: |
          mkdir -p build/tmp/Payload
          cp -r build/ios/Release-iphoneos/Runner.app build/tmp/Payload/
          cd build/tmp
          zip -r olib-mobile-unsigned.ipa Payload
          mkdir -p ../output
          mv olib-mobile-unsigned.ipa ../output/

      # 上传 IPA 到制品，网页下载
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: build/output/*.ipa
          retention-days: 30

name: Build Unsigned IPA
run-name: 打包无签名iOS IPA
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.38.7
          cache: true

      - name: Flutter初始化配置
        run: |
          # 禁用SPM，避免FlutterFramework找不到的bug
          flutter config --no-enable-swift-package-manager
          flutter doctor
          flutter clean

      - name: 注释本地olib_api_plugin依赖
        run: |
          perl -i -pe 's/^(\s*olib_api_plugin:)/#$1/' pubspec.yaml
          perl -i -pe 's/^(\s*path: vendor\/olib_api_plugin)/#$1/' pubspec.yaml
          echo "已注释olib_api_plugin本地依赖"

      - name: 项目级禁用SPM
        run: |
          # 在pubspec.yaml的flutter部分添加禁用SPM配置
          if grep -q "flutter:" pubspec.yaml; then
            # 找到flutter:那一行，在后面插入enable-swift-package-manager: false
            perl -i -pe 's/^(flutter:)$/$1\n  enable-swift-package-manager: false/' pubspec.yaml
          fi
          echo "已在项目级禁用SPM"

      - name: Install pub dependencies
        run: flutter pub get

      - name: 修复Podfile与项目部署版本
        run: |
          cd ios
          
          echo "=== 修改前 Podfile ==="
          head -10 Podfile
          
          # 取消platform行的注释（如果有）
          perl -i -pe 's/^#\s*platform\s+:ios/platform :ios/' Podfile
          
          # 修改或插入platform版本
          if grep -q "platform :ios" Podfile; then
            perl -i -pe 's/platform :ios,\s*['\''"]?\d+\.\d+['\''"]?/platform :ios, "13.0"/' Podfile
          else
            echo 'platform :ios, "13.0"' > /tmp/podfile_head
            cat Podfile >> /tmp/podfile_head
            mv /tmp/podfile_head Podfile
          fi
          
          echo "=== 修改后 Podfile ==="
          head -5 Podfile
          
          # 修改Xcode项目部署版本
          perl -i -pe 's/IPHONEOS_DEPLOYMENT_TARGET = \d+\.\d+;/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/g' Runner.xcodeproj/project.pbxproj
          echo "已修改Runner.xcodeproj部署版本为13.0"

      - name: Install Pods
        run: |
          cd ios
          pod repo update
          pod install

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir -p build/tmp/Payload
          cp -r build/ios/Release-iphoneos/Runner.app build/tmp/Payload/
          cd build/tmp
          zip -r olib-mobile-unsigned.ipa Payload
          mkdir -p ../output
          mv olib-mobile-unsigned.ipa ../output/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: olib-mobile-unsigned-ipa
          path: build/output/*.ipa
          retention-days: 30

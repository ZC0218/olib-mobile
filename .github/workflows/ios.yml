name: iOS Enterprise Build Stable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      # 1️⃣ 拉代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Flutter环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"
          cache: false

      # 3️⃣ 环境检查
      - name: Check Environment
        run: |
          flutter --version
          dart --version
          xcodebuild -version

      # 4️⃣ 清理
      - name: Clean Project
        run: |
          flutter clean
          rm -rf ios
          rm -rf pubspec.lock

      # 5️⃣ 拉依赖
      - name: Get Dependencies
        run: flutter pub get

      # 6️⃣ 代码生成（必须）
      - name: Code Generation
        run: dart run build_runner build --delete-conflicting-outputs

      # 7️⃣ 重新生成 iOS（解决 org 冲突）
      - name: Recreate iOS Project
        run: flutter create . --org com.openlibrary

      # 8️⃣ 导入证书
      - name: Install Certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > cert.p12

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain

          security import cert.p12 \
            -k build.keychain \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "" build.keychain

      # 9️⃣ 安装描述文件
      - name: Install Provisioning Profile
        env:
          PROVISION_BASE64: ${{ secrets.PROVISION_BASE64 }}
        run: |
          echo "$PROVISION_BASE64" | base64 --decode > profile.mobileprovision

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      # 🔟 修复 Pods（iOS 12）
      - name: Fix Pods & Install
        run: |
          cd ios

          # 设置最低版本
          sed -i '' 's/platform :ios, .*/platform :ios, '\''12.0'\''/' Podfile

          # 强制Pods版本
          cat >> Podfile <<'EOF'

post_install do |installer|
  installer.pods_project.targets.each do |target|
    target.build_configurations.each do |config|
      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '12.0'
    end
  end
end
EOF

          pod deintegrate
          pod install --repo-update

      # 1️⃣1️⃣ 构建 IPA（企业签名）
      - name: Build IPA
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      # 1️⃣2️⃣ 上传
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: enterprise-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 7

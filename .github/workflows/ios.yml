name: iOS Enterprise Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      # 拉代码
      - uses: actions/checkout@v4

      # Flutter环境
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.5"

      # 清理
      - run: flutter clean
      - run: rm -rf ios
      - run: rm -f pubspec.lock

      # 依赖
      - run: flutter pub get

      # 代码生成（这个项目必须）
      - run: dart run build_runner build --delete-conflicting-outputs

      # 修复 org 冲突
      - run: flutter create . --org com.openlibrary

      # 导入证书
      - name: Install Certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      # 描述文件
      - name: Install Provisioning Profile
        env:
          PROVISION_BASE64: ${{ secrets.PROVISION_BASE64 }}
        run: |
          echo "$PROVISION_BASE64" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      # 安装Pods
      - name: Install Pods
        run: |
          cd ios
          sed -i '' 's/platform :ios, .*/platform :ios, '\''12.0'\''/' Podfile
          pod install --repo-update

      # 打包
      - name: Build IPA
        run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

      # 上传
      - uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/ios/ipa/*.ipa
